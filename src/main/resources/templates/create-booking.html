<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Создание бронирования</title>
</head>
<body>

<h1>Создание бронирования</h1>

<div th:if="${error}" style="color: red; font-weight: bold; margin-bottom: 20px;">
  <span th:text="${error}"></span>
</div>

<form th:action="@{/bookings/create}" th:object="${createBookingRequest}" method="post">

  <label for="resourceId">Ресурс:</label>
  <select id="resourceId" th:field="*{resourceId}" required>
    <option value="">-- Выберите ресурс --</option>
    <option th:each="resource : ${resources}"
            th:value="${resource.id}"
            th:text="${resource.name + ' | доступен с: ' + resource.availableFrom + ' до: ' + resource.availableTo}">
    </option>
  </select>
  <br><br>

  <label for="startTime">Начало бронирования:</label>
  <input type="datetime-local" id="startTime" th:field="*{startTime}" required>
  <br><br>

  <label for="endTime">Окончание бронирования:</label>
  <input type="datetime-local" id="endTime" th:field="*{endTime}" required>
  <br><br>

  <label for="purpose">Цель:</label>
  <input type="text" id="purpose" th:field="*{purpose}" required>
  <br><br>

  <button type="submit">Создать бронирование</button>
</form>

<br>
<a href="/bookings">Назад к списку бронирований</a>
<br><br>
<a href="/">На главную</a>

</body>
</html>
