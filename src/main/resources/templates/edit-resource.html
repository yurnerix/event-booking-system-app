<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование ресурса</title>
</head>
<body>

<h1>Редактирование ресурса</h1>

<form th:action="@{/resources/edit/{id}(id=${resourceId})}" th:object="${updateResourceRequest}" method="post">

    <label for="name">Название:</label>
    <input type="text" id="name" th:field="*{name}" required>
    <br><br>

    <label for="description">Описание:</label>
    <input type="text" id="description" th:field="*{description}" required>
    <br><br>

    <label for="type">Тип ресурса:</label>
    <select id="type" th:field="*{type}" required>
        <option value="">-- Выберите тип --</option>
        <option th:each="type : ${resourceTypes}"
                th:value="${type}"
                th:text="${type}">
        </option>
    </select>
    <br><br>

    <label for="location">Местоположение:</label>
    <input type="text" id="location" th:field="*{location}" required>
    <br><br>

    <label for="capacity">Вместимость:</label>
    <input type="number" id="capacity" th:field="*{capacity}" required>
    <br><br>

    <label for="active">Активен:</label>
    <input type="checkbox" id="active" th:field="*{active}">
    <br><br>

    <label for="availableFrom">Доступен с:</label>
    <input type="datetime-local"
           id="availableFrom"
           th:field="*{availableFrom}"
           th:value="${#temporals.format(updateResourceRequest.availableFrom, 'yyyy-MM-dd''T''HH:mm')}"
           required>
    <br><br>

    <label for="availableTo">Доступен до:</label>
    <input type="datetime-local"
           id="availableTo"
           th:field="*{availableTo}"
           th:value="${#temporals.format(updateResourceRequest.availableTo, 'yyyy-MM-dd''T''HH:mm')}"
           required>
    <br><br>

    <button type="submit">Сохранить изменения</button>
</form>

<br>
<a href="/resources">Назад к списку ресурсов</a>
<br><br>
<a href="/">На главную</a>

</body>
</html>
